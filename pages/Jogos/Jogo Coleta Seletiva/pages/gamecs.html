<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleta Seletiva | Jogo</title>
    <link rel="stylesheet" href="../css/gamecs.css">
    <link rel="shortcut icon" href="../../../../img/logoEcobrieduqueTitulo.png" type="image/x-icon">

</head>
<body>
    <header>
        <div class="container">
            <img src="../../../../img/logoEcobrieduqueTitulo.png" alt="" id="img" class="centered-image">
            <h1>Coleta Seletiva</h1>
            <div id="cronometro">Tempo: <span id="tempo">0</span> segundo(s)</div>
            <div id="pontos-container">Pontos: <span id="pontos">0</span></div>
        </div>
    </header>

    <main>
        <div id="lixo-container">
        </div>
        <div class="rodape">
        <div id="lixeiras">
        </div>
        </div>
        <button id="reiniciar" class="hidden">Jogar Novamente</button>
        <div id="mensagem" class="hidden"></div>
    </main>

    <div id="tela-final" class="hidden">
        <h2>Parabéns!</h2>
        <p id="tempo-final"></p>
        <p id="pontos-finais"></p>
        <button id="jogar-novamente">Jogar Novamente</button>
    </div>

    <script src="../js/gamecs.js"></script>
</body>
</html>
